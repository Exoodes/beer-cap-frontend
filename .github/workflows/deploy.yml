name: Automate Frontend Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Execute Deployment Commands on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/deploy/apps/beer-cap-frontend
            git pull origin master
            npm ci
            npm run build
            sudo rsync -av --delete dist/ /var/www/caps-frontend/
            sudo chown -R www-data:www-data /var/www/caps-frontend